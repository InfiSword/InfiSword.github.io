behaviors:
  SimcadeCarAgent_Auto:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 10240       
      learning_rate: 0.0002
      beta: 0.002
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 5000000
    time_horizon: 128
    summary_freq: 10000
    keep_checkpoints: 5