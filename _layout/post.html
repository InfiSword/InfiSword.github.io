<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Minhyuk Lee</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0D1117;
            --card-bg: #161B22;
            --text-color: #C9D1D9;
            --accent-color: #58A6FF;
            --sub-accent: #238636;
            --border-color: #30363D;
            --code-bg: #010409;
            --code-comment: #8b949e;
            --code-keyword: #ff7b72;
            --code-type: #79c0ff;
            --code-func: #d2a8ff;
            --code-string: #a5d6ff;
        }

        /* --- Global Style Inherit --- */
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

        /* Custom Cursor */
        #custom-cursor {
            width: 10px;
            height: 10px;
            border: 1px solid var(--accent-color);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: width 0.1s, height 0.1s;
        }
        #custom-cursor-dot {
            width: 3px;
            height: 3px;
            background-color: var(--accent-color);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }

        /* Layout Container */
        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header Navigation */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }
        .back-link {
            font-family: 'Fira Code', monospace;
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .meta-host {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: var(--code-comment);
        }

        /* --- Terminal Frame for Articles --- */
        .post-window {
            background-color: var(--code-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            margin-bottom: 40px;
        }
        .post-terminal-header {
            background-color: #161b22;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .terminal-buttons {
            display: flex;
            gap: 8px;
            margin-right: 15px;
        }
        .terminal-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .btn-red { background-color: #ff5f56; }
        .btn-yellow { background-color: #ffbd2e; }
        .btn-green { background-color: #27c93f; }
        .terminal-title {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: var(--code-comment);
            flex-grow: 1;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 10px;
        }

        /* Post Content Space */
        .post-body {
            padding: 30px 40px;
            color: var(--text-color);
        }

        /* Article Meta */
        .post-title-section {
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .post-category {
            font-family: 'Fira Code', monospace;
            color: var(--sub-accent);
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 8px;
        }
        .post-main-title {
            font-size: 2rem;
            color: #ffffff;
            line-height: 1.3;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .post-date-meta {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--code-comment);
        }

        /* --- MARKDOWN ARTICLE RENDERING --- */
        .content-area {
            font-size: 1rem;
            line-height: 1.8;
            color: #d1d5db;
        }
        .content-area p {
            margin-bottom: 20px;
        }
        .content-area h1, 
        .content-area h2, 
        .content-area h3, 
        .content-area h4 {
            color: #ffffff;
            font-weight: 700;
            margin-top: 35px;
            margin-bottom: 15px;
            font-family: 'Inter', sans-serif;
        }
        .content-area h1 { font-size: 1.6rem; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .content-area h2 { font-size: 1.35rem; border-bottom: 1px dashed var(--border-color); padding-bottom: 5px; }
        .content-area h3 { font-size: 1.15rem; }

        /* Inline Code */
        .content-area code {
            font-family: 'Fira Code', monospace;
            font-size: 0.88em;
            background-color: #1f242c;
            color: var(--accent-color);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        /* Code Blocks */
        .content-area pre {
            background-color: #010409;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 18px;
            overflow-x: auto;
            margin: 25px 0;
            line-height: 1.5;
        }
        .content-area pre code {
            background-color: transparent !important;
            border: none !important;
            padding: 0 !important;
            color: #e6edf3;
            font-size: 0.85rem;
        }

        /* Lists */
        .content-area ul, 
        .content-area ol {
            padding-left: 24px;
            margin-bottom: 20px;
        }
        .content-area li {
            margin-bottom: 8px;
        }

        /* Blockquotes */
        .content-area blockquote {
            border-left: 4px solid var(--accent-color);
            background-color: var(--card-bg);
            padding: 15px 20px;
            margin: 25px 0;
            border-radius: 0 6px 6px 0;
            font-style: italic;
            color: #cbd5e1;
        }
        .content-area blockquote p:last-child {
            margin-bottom: 0;
        }

        /* Links */
        .content-area a {
            color: var(--accent-color);
            text-decoration: none;
        }
        .content-area a:hover {
            text-decoration: underline;
        }

        /* Table Design */
        .content-area table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
            font-size: 0.9rem;
        }
        .content-area th, 
        .content-area td {
            border: 1px solid var(--border-color);
            padding: 10px 12px;
            text-align: left;
        }
        .content-area th {
            background-color: var(--card-bg);
            color: #ffffff;
            font-weight: 600;
        }
        .content-area tr:nth-child(even) {
            background-color: rgba(22, 27, 34, 0.4);
        }

        /* --- ROUGE HIGHLIGHT THEME SYNC --- */
        .highlight .c, .highlight .ch, .highlight .cd, .highlight .cm, .highlight .cpf, .highlight .c1, .highlight .cs { color: var(--code-comment) !important; font-style: italic; } /* Comment */
        .highlight .k, .highlight .kd, .highlight .kn, .highlight .kp, .highlight .kr, .highlight .kt { color: var(--code-keyword) !important; font-weight: bold; } /* Keyword */
        .highlight .nc, .highlight .no, .highlight .nd, .highlight .ni, .highlight .ne { color: var(--code-type) !important; } /* Type/Class */
        .highlight .nf, .highlight .fm { color: var(--code-func) !important; } /* Function */
        .highlight .s, .highlight .sa, .highlight .sb, .highlight .sc, .highlight .dl, .highlight .sd, .highlight .s2, .highlight .sh, .highlight .s1 { color: var(--code-string) !important; } /* String */
        .highlight .m, .highlight .mb, .highlight .mx, .highlight .mi, .highlight .mo { color: #f2cc60 !important; } /* Number */
        .highlight .o { color: #ff7b72 !important; } /* Operator */

        /* Post Footer back button */
        .post-footer {
            margin-top: 40px;
            text-align: center;
        }
        .post-footer .back-link {
            display: inline-flex;
            font-size: 1rem;
        }

        /* Media Queries */
        @media (max-width: 768px) {
            .post-body { padding: 20px 25px; }
            .post-main-title { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div id="custom-cursor"></div>
    <div id="custom-cursor-dot"></div>

    <div class="container">
        <!-- HEADER / NAVIGATION -->
        <nav class="nav-header">
            <a href="{{ '/' | relative_url }}" class="back-link">
                &lt;-- back_to_root.sh
            </a>
            <span class="meta-host">guest@minhyuk-dev:~</span>
        </nav>

        <!-- TERMINAL POST CONTAINER -->
        <article class="post-window">
            <div class="post-terminal-header">
                <div class="terminal-buttons">
                    <span class="terminal-btn btn-red"></span>
                    <span class="terminal-btn btn-yellow"></span>
                    <span class="terminal-btn btn-green"></span>
                </div>
                <div class="terminal-title">cat _posts/{{ page.path | split: "/" | last }}</div>
            </div>
            
            <div class="post-body">
                <header class="post-title-section">
                    <span class="post-category">{{ page.categories | first | default: "systems" }}</span>
                    <h1 class="post-main-title">{{ page.title }}</h1>
                    <div class="post-date-meta">LOGGED_DATE: {{ page.date | date: "%Y.%m.%d" }} | AUTHOR: Minhyuk Lee</div>
                </header>

                <div class="content-area">
                    {{ content }}
                </div>
            </div>
        </article>

        <footer class="post-footer">
            <a href="{{ '/' | relative_url }}" class="back-link">
                &lt;-- cd ..
            </a>
        </footer>
    </div>

    <!-- Custom Cursor Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cursor = document.getElementById('custom-cursor');
            const dot = document.getElementById('custom-cursor-dot');
            
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                dot.style.left = e.clientX + 'px';
                dot.style.top = e.clientY + 'px';
            });

            document.addEventListener('mousedown', () => {
                cursor.style.width = '20px';
                cursor.style.height = '20px';
                cursor.style.backgroundColor = 'rgba(88, 166, 255, 0.2)';
            });

            document.addEventListener('mouseup', () => {
                cursor.style.width = '10px';
                cursor.style.height = '10px';
                cursor.style.backgroundColor = 'transparent';
            });

            // Interactive element hover effect
            const links = document.querySelectorAll('a, button, code');
            links.forEach(link => {
                link.addEventListener('mouseenter', () => {
                    cursor.style.borderColor = '#238636';
                    dot.style.backgroundColor = '#238636';
                });
                link.addEventListener('mouseleave', () => {
                    cursor.style.borderColor = '#58A6FF';
                    dot.style.backgroundColor = '#58A6FF';
                });
            });
        });
    </script>
</body>
</html>
