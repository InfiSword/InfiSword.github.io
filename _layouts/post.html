<!DOCTYPE html>
<html>
<head>
    <!-- [site.title]은 _config.yml에서 지정한 "민혁의 DevLog"가 들어갑니다 -->
    <title>{{ page.title }} | {{ site.title }}</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 40px; }
        .post-box { border: 1px solid #30363d; padding: 20px; border-radius: 8px; }
        h1 { color: #58a6ff; }
        .date { color: #8b949e; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="/">← 목록으로 돌아가기</a>
    <hr>

    <div class="post-box">
        <!-- 1. [page.title]에는 마크다운의 title인 "GPU 파이프라인 정복하기"가 들어갑니다. -->
        <h1>{{ page.title }}</h1>
        <p class="date">작성일: {{ page.date | date: "%Y년 %m월 %d일" }}</p>
        
        <!-- 2. [content] 자리에 마크다운으로 쓴 본문 내용 전체가 자동으로 HTML로 바뀌어 들어갑니다. -->
        <article>
            {{ content }}
        </article>
    </div>
</body>
</html>
